<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tout Terrain Club — Accueil</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root" data-screen-label="Accueil vitrine"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="hero.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hero": "split",
  "density": "compact",
  "techno": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  // Apply density + techno mode at the page level
  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--density", tweaks.density === "compact" ? "0.78" : "1");
    document.body.classList.toggle("mode-techno", !!tweaks.techno);
  }, [tweaks.density, tweaks.techno]);

  const HeroChosen = tweaks.hero === "split" ? window.Hero.HeroSplit
                   : tweaks.hero === "dossard" ? window.Hero.HeroDossard
                   : window.Hero.HeroEditorial;

  return (
    <div className="page">
      <HeaderPublic active="Accueil" />
      <HeroChosen />
      <Sections.WeeklyRuns />
      <section style={{ background: "var(--ink)" }}>
        <div style={{ position: "relative" }}>
          <img src="img/club-team.jpg" alt="La meute Tout Terrain Club, coucher de soleil au-dessus de Nice" style={{ width: "100%", display: "block", maxHeight: "78vh", objectFit: "cover" }} />
          <div style={{ position: "absolute", left: 20, right: 20, bottom: 20, fontFamily: "var(--f-mono)", fontSize: 12, letterSpacing: ".12em", textTransform: "uppercase", color: "#fff", textShadow: "0 1px 10px rgba(0,0,0,.6)" }}>
            ● La meute · au-dessus de Nice
          </div>
        </div>
      </section>
      <Sections.T2TTeaser />
      <Sections.Directions />
      <Sections.JoinCta />
      <PartnersBand />
      <FooterPublic />

      <window.TweaksPanel title="Tweaks · TTC">
        <window.TweakSection title="Hero">
          <window.TweakRadio
            label="Variante"
            value={tweaks.hero}
            options={[
              { value: "editorial", label: "Éditorial" },
              { value: "split", label: "Split" },
              { value: "dossard", label: "Dossard" },
            ]}
            onChange={(v) => setTweak("hero", v)}
          />
        </window.TweakSection>

        <window.TweakSection title="Densité">
          <window.TweakRadio
            label="Espacements"
            value={tweaks.density}
            options={[
              { value: "compact", label: "Compact" },
              { value: "aere", label: "Aéré" },
            ]}
            onChange={(v) => setTweak("density", v)}
          />
        </window.TweakSection>

        <window.TweakSection title="Mode techno">
          <window.TweakToggle
            label="Activer (vert sur noir, esprit terminal)"
            value={tweaks.techno}
            onChange={(v) => setTweak("techno", v)}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
