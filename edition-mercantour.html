<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Trail to Techno — Édition Mercantour</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />

<style id="mercantour-red">
  /* Édition Mercantour — accent rouge (scoppé à cette page) */
  :root{
    --uv:#e23a2a; --uv-2:#b02a1d; --acid:#f0897c;
    --green:#e23a2a; --green-2:#c22f20; --green-3:#b02a1d;
    --glow:226,58,42;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root" data-screen-label="Édition Mercantour"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="tampons.jsx"></script>
<script type="text/babel" src="mercantour.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "aere",
  "couleur": "Rouge",
  "fond": "Clair"
}/*EDITMODE-END*/;

const MERC_PALETTES = {
  Rouge: { "--uv": "#e23a2a", "--uv-2": "#b02a1d", "--acid": "#f0897c", "--green": "#e23a2a", "--green-2": "#c22f20", "--green-3": "#b02a1d", "--glow": "226,58,42" },
  Vert:  { "--uv": "#7ddf64", "--uv-2": "#4ea63b", "--acid": "#b6f09c", "--green": "#7ddf64", "--green-2": "#5bbf6a", "--green-3": "#4ea63b", "--glow": "125,223,100" },
};

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--density", tweaks.density === "compact" ? "0.8" : "1");
  }, [tweaks.density]);

  React.useEffect(() => {
    const pal = MERC_PALETTES[tweaks.couleur] || MERC_PALETTES.Rouge;
    Object.entries(pal).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
  }, [tweaks.couleur]);

  React.useEffect(() => {
    const el = document.querySelector(".t2t-page");
    if (el) el.classList.toggle("light", tweaks.fond === "Clair");
  }, [tweaks.fond]);

  return (
    <div className="page t2t-page">
      <HeaderPublic active="Trail to Techno" />
      <MERC.MercHero />
      <MERC.MercMetabar />
      <MERC.MercExpo />
      <MERC.MercFormats />
      <MERC.MercLocation />
      <MERC.MercNight />
      <MERC.MercProgram />
      <MERC.MercReserve />
      <FooterPublic />

      <window.TweaksPanel title="Tweaks · Mercantour">
        <window.TweakSection title="Couleur">
          <window.TweakRadio
            label="Accent"
            value={tweaks.couleur}
            options={[
              { value: "Rouge", label: "Rouge" },
              { value: "Vert", label: "Vert" },
            ]}
            onChange={(v) => setTweak("couleur", v)}
          />
        </window.TweakSection>
        <window.TweakSection title="Fond">
          <window.TweakRadio
            label="Ambiance"
            value={tweaks.fond}
            options={[
              { value: "Foncé", label: "Foncé" },
              { value: "Clair", label: "Clair" },
            ]}
            onChange={(v) => setTweak("fond", v)}
          />
        </window.TweakSection>
        <window.TweakSection title="Densité">
          <window.TweakRadio
            label="Espacements"
            value={tweaks.density}
            options={[
              { value: "compact", label: "Compact" },
              { value: "aere", label: "Aéré" },
            ]}
            onChange={(v) => setTweak("density", v)}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
